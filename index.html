<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binance 即時價格圖</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>BTC/USDT 即時價格</h1>
      <div class="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">連線中...</span>
      </div>
    </div>

    <div class="price-bar">
      <div class="price-item bid">
        <span class="label">Best Bid</span>
        <span class="value" id="bid-price">—</span>
      </div>
      <div class="price-item ask">
        <span class="label">Best Ask</span>
        <span class="value" id="ask-price">—</span>
      </div>
      <div class="price-item spread">
        <span class="label">Spread</span>
        <span class="value" id="spread">—</span>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="priceChart"></canvas>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
